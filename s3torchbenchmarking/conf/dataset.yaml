defaults:
  - hydra/callbacks:
      - collate_results
  - aws:
      - s3
      - dynamodb # save run results to DynamoDB (see also conf/aws/dynamodb.yaml) -- comment me if not required
  - _self_

prefix_uri: ???
region: ???
sharding: False
epochs: 1

hydra:
  mode: MULTIRUN
  sweep:
    dir: multirun/${hydra.job.config_name}/${now:%Y-%m-%d_%H-%M-%S}
  sweeper:
    params:
      +model: entitlement
      +dataloader: s3iterabledataset
